name: Deploy Tienda Perritos CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    # ===================================================================
    # PASO 1: VERIFICAR SI EL STACK YA EXISTE EN AWS
    # ===================================================================
    - name: Comprobar existencia del Stack
      id: check-stack
      run: |
        if aws cloudformation describe-stacks --stack-name DevopsEv3 > /dev/null 2>&1; then
          echo "existe=true" >> $GITHUB_OUTPUT
          echo "¡El clúster ya existe en AWS bajo el nombre DevopsEv3! Saltando creación..."
        else
          echo "existe=false" >> $GITHUB_OUTPUT
          echo "El clúster DevopsEv3 no existe. Iniciando aprovisionamiento completo..."
        fi

    # ===================================================================
    # PASO 2: CREAR INFRAESTRUCTURA (Solo se ejecuta si NO existe DevopsEv3)
    # ===================================================================
    - name: Desplegar Infraestructura Base (CloudFormation)
      if: steps.check-stack.outputs.existe == 'false'
      uses: aws-actions/aws-cloudformation-github-deploy@v1
      with:
        name: DevopsEv3
        template: duoc-devops-act3.yaml
        no-fail-on-empty-changeset: "1"
        parameter-overrides: "EksClusterRoleName=LabRole,EksNodeRoleName=LabRole"

    # ===================================================================
    # PASO 3: CONECTARSE AL CLÚSTER (Aplica para ambos casos)
    # ===================================================================
    - name: Actualizar Kubeconfig para EKS
      run: |
        aws eks update-kubeconfig --region us-east-1 --name devopseks

    # ===================================================================
    # PASO 4: AUTENTICAR DOCKER CON AMAZON ECR
    # ===================================================================
    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # ===================================================================
    # PASO 5: COMPILAR, ETIQUETAR Y SUBIR IMÁGENES
    # ===================================================================
    - name: Compilar y Subir Imágenes a AWS ECR
      run: |
        # 1. Obtenemos la URL real de tu cuenta
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
        REAL_ECR_URL="${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
        
        echo "=========================================================="
        echo "REPOSITORIOS DETECTADOS EN TU CUENTA DE AWS ACTUAL:"
        aws ecr describe-repositories --query "repositories[].repositoryName" --output table
        echo "=========================================================="
        
        # 2. Mapear dinámicamente los nombres reales creados por CloudFormation
        REPO_DB=$(aws ecr describe-repositories --query "repositories[?contains(repositoryName, 'db') || contains(repositoryName, 'mysql')].repositoryName" --output text | awk '{print $1}')
        REPO_BACK=$(aws ecr describe-repositories --query "repositories[?contains(repositoryName, 'backend') || contains(repositoryName, 'back')].repositoryName" --output text | awk '{print $1}')
        REPO_FRONT=$(aws ecr describe-repositories --query "repositories[?contains(repositoryName, 'frontend') || contains(repositoryName, 'front')].repositoryName" --output text | awk '{print $1}')

        echo "Mapeo de Repositorios Reales de AWS:"
        echo "-> Carpeta db/ irá al Repositorio AWS: $REPO_DB"
        echo "-> Carpeta backend/ irá al Repositorio AWS: $REPO_BACK"
        echo "-> Carpeta frontend/ irá al Repositorio AWS: $REPO_FRONT"

        # 3. Compilar y subir usando tus carpetas locales hacia los repositorios REALES de AWS
        echo "Compilando e impulsando imagen de Base de Datos..."
        docker build -t $REAL_ECR_URL/$REPO_DB:eks-v1 ./db
        docker push $REAL_ECR_URL/$REPO_DB:eks-v1

        echo "Compilando e impulsando imagen de Backend..."
        docker build -t $REAL_ECR_URL/$REPO_BACK:eks-v1 ./backend
        docker push $REAL_ECR_URL/$REPO_BACK:eks-v1

        echo "Compilando e impulsando imagen de Frontend..."
        docker build -t $REAL_ECR_URL/$REPO_FRONT:eks-v1 ./frontend
        docker push $REAL_ECR_URL/$REPO_FRONT:eks-v1

        # 4. REEMPLAZO ULTRA SEGURO: Reemplaza solo la variable base {{ECR_URL}} por la real de AWS
        sed -i "s|{{ECR_URL}}|$REAL_ECR_URL|g" k8s/mysql-deployment.yaml
        sed -i "s|{{ECR_URL}}|$REAL_ECR_URL|g" k8s/backend-deployment.yaml
        sed -i "s|{{ECR_URL}}|$REAL_ECR_URL|g" k8s/frontend-deployment.yaml

        # 5. Además, si el repositorio real de AWS se llama diferente a 'tienda-backend', corregimos el nombre en el archivo corregido
        sed -i "s|/tienda-db:|$/$REPO_DB:|g" k8s/mysql-deployment.yaml
        sed -i "s|/tienda-backend:|$/$REPO_BACK:|g" k8s/backend-deployment.yaml
        sed -i "s|/tienda-frontend:|$/$REPO_FRONT:|g" k8s/frontend-deployment.yaml

        # 6. Limpieza estratégica preventiva para eliminar de raíz los pods viejos pegados
        if kubectl get namespace tienda > /dev/null 2>&1; then
          echo "Reseteando pods previos para aplicar las imágenes recién subidas..."
          kubectl delete namespace tienda --timeout=60s || echo "Continuando..."
        fi

    # ===================================================================
    # PASO 6: DESPLIEGUE EN KUBERNETES
    # ===================================================================
    - name: Desplegar en Kubernetes
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/mysql-secret.yaml -n tienda
        kubectl apply -f k8s/mysql-deployment.yaml -n tienda
        kubectl apply -f k8s/mysql-service.yaml -n tienda
        kubectl apply -f k8s/backend-deployment.yaml -n tienda
        kubectl apply -f k8s/backend-service.yaml -n tienda
        kubectl apply -f k8s/backend-hpa.yaml -n tienda
        kubectl apply -f k8s/frontend-deployment.yaml -n tienda
        kubectl apply -f k8s/frontend-service.yaml -n tienda
        kubectl apply -f k8s/frontend-hpa.yaml -n tienda

    # ===================================================================
    # PASO 7: DIAGNÓSTICO DE PODS
    # ===================================================================
    - name: Verificar Estado de Salud de los Pods
      run: |
        echo "Esperando 45 segundos a que Kubernetes descargue e inicie los nuevos contenedores..."
        sleep 45
        echo "=========================================================="
        echo "REVISANDO SI LOS CONTENEDORES ESTÁN CORRIENDO BIEN:"
        kubectl get pods -n tienda
        echo "=========================================================="

    # ===================================================================
    # PASO 8: OBTENER URL DE LA WEB
    # ===================================================================
    - name: Obtener URL de la Tienda de Perritos
      run: |
        echo "=========================================================="
        echo "ESTADO DE LOS SERVICIOS EN EL NAMESPACE 'TIENDA':"
        kubectl get svc -n tienda
        echo "=========================================================="
