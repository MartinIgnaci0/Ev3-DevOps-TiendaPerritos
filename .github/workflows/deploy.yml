name: Deploy Tienda Perritos CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    # ===================================================================
    # PASO 1: VERIFICAR SI EL STACK YA EXISTE EN AWS
    # ===================================================================
    - name: Comprobar existencia del Stack
      id: check-stack
      run: |
        if aws cloudformation describe-stacks --stack-name DevopsEv3 > /dev/null 2>&1; then
          echo "existe=true" >> $GITHUB_OUTPUT
          echo "¡El clúster ya existe en AWS bajo el nombre DevopsEv3! Saltando creación..."
        else
          echo "existe=false" >> $GITHUB_OUTPUT
          echo "El clúster DevopsEv3 no existe. Iniciando aprovisionamiento completo..."
        fi

    # ===================================================================
    # PASO 2: CREAR INFRAESTRUCTURA (Solo se ejecuta si NO existe DevopsEv3)
    # ===================================================================
    - name: Desplegar Infraestructura Base (CloudFormation)
      if: steps.check-stack.outputs.existe == 'false'
      uses: aws-actions/aws-cloudformation-github-deploy@v1
      with:
        name: DevopsEv3
        template: duoc-devops-act3.yaml
        no-fail-on-empty-changeset: "1"
        parameter-overrides: "EksClusterRoleName=LabRole,EksNodeRoleName=LabRole"

    # ===================================================================
    # PASO 3: CONECTARSE AL CLÚSTER (Aplica para ambos casos)
    # ===================================================================
    - name: Actualizar Kubeconfig para EKS
      run: |
        aws eks update-kubeconfig --region us-east-1 --name devopseks

    # ===================================================================
    # PASO 4: REEMPLAZAR DINÁMICAMENTE {{ECR_URL}} POR LA REAL Y LIMPIAR
    # ===================================================================
    - name: Configurar URL Real de ECR y Resetear Kubernetes
      run: |
        # 1. Detectamos el ID de la cuenta actual de AWS
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
        REAL_ECR_URL="${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
        echo "Inyectando URL de ECR detectada: $REAL_ECR_URL"
        
        # 2. Corregimos los archivos YAML reemplazando la plantilla flotante
        sed -i "s|{{ECR_URL}}|$REAL_ECR_URL|g" k8s/mysql-deployment.yaml
        sed -i "s|{{ECR_URL}}|$REAL_ECR_URL|g" k8s/backend-deployment.yaml
        sed -i "s|{{ECR_URL}}|$REAL_ECR_URL|g" k8s/frontend-deployment.yaml

        # 3. PURGA ESTRATÉGICA: Si el namespace 'tienda' ya existía con errores, 
        # lo borramos por completo para que no queden pods huérfanos pegados en ImagePullBackOff.
        if kubectl get namespace tienda > /dev/null 2>&1; then
          echo "Reseteando despliegues previos con errores..."
          kubectl delete namespace tienda --timeout=60s || echo "Continuando..."
        fi

    # ===================================================================
    # PASO 5: DESPLIEGUE EN KUBERNETES (Limpio y con URLs reales)
    # ===================================================================
    - name: Desplegar en Kubernetes (EKS)
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/mysql-secret.yaml -n tienda
        kubectl apply -f k8s/mysql-deployment.yaml -n tienda
        kubectl apply -f k8s/mysql-service.yaml -n tienda
        kubectl apply -f k8s/backend-deployment.yaml -n tienda
        kubectl apply -f k8s/backend-service.yaml -n tienda
        kubectl apply -f k8s/backend-hpa.yaml -n tienda
        kubectl apply -f k8s/frontend-deployment.yaml -n tienda
        kubectl apply -f k8s/frontend-service.yaml -n tienda
        kubectl apply -f k8s/frontend-hpa.yaml -n tienda

    # ===================================================================
    # PASO 6: DIAGNÓSTICO DE PODS (Le damos más tiempo para iniciar)
    # ===================================================================
    - name: Verificar Estado de Salud de los Pods
      run: |
        echo "Esperando 25 segundos a que Kubernetes descargue las imágenes desde ECR..."
        sleep 25
        echo "=========================================================="
        echo "REVISANDO SI LOS CONTENEDORES ESTÁN CORRIENDO BIEN:"
        kubectl get pods -n tienda
        echo "=========================================================="

    # ===================================================================
    # PASO 7: OBTENER URL DE LA WEB
    # ===================================================================
    - name: Obtener URL de la Tienda de Perritos
      run: |
        echo "=========================================================="
        echo "ESTADO DE LOS SERVICIOS EN EL NAMESPACE 'TIENDA':"
        kubectl get svc -n tienda
        echo "=========================================================="
        echo "REVISAR COLUMNA 'EXTERNAL-IP' DEL SERVICIO FRONTEND ARRIBA"
        echo "=========================================================="
