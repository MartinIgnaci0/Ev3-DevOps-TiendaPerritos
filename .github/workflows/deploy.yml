name: Deploy Tienda Perritos CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    # ===================================================================
    # PASO 1: VERIFICAR/CREAR INFRAESTRUCTURA
    # ===================================================================
    - name: Comprobar existencia del Stack
      id: check-stack
      run: |
        if aws cloudformation describe-stacks --stack-name DevopsEv3 > /dev/null 2>&1; then
          echo "existe=true" >> $GITHUB_OUTPUT
        else
          echo "existe=false" >> $GITHUB_OUTPUT
        fi

    - name: Desplegar Infraestructura Base (CloudFormation)
      if: steps.check-stack.outputs.existe == 'false'
      uses: aws-actions/aws-cloudformation-github-deploy@v1
      with:
        name: DevopsEv3
        template: duoc-devops-act3.yaml
        no-fail-on-empty-changeset: "1"
        parameter-overrides: "EksClusterRoleName=LabRole,EksNodeRoleName=LabRole"

    # ===================================================================
    # PASO 2: CONECTARSE AL CLÚSTER
    # ===================================================================
    - name: Actualizar Kubeconfig para EKS
      run: |
        aws eks update-kubeconfig --region us-east-1 --name devopseks

    # ===================================================================
    # PASO 3: AUTENTICAR CON AMAZON ECR
    # ===================================================================
    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # ===================================================================
    # PASO 4: COMPILAR Y SUBIR IMÁGENES A ECR
    # ===================================================================
    - name: Compilar y Subir Imágenes a AWS ECR
      run: |
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
        REAL_ECR_URL="${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
        
        docker build -t $REAL_ECR_URL/tienda-db:eks-v1 ./db
        docker push $REAL_ECR_URL/tienda-db:eks-v1

        docker build -t $REAL_ECR_URL/tienda-backend:eks-v1 ./backend
        docker push $REAL_ECR_URL/tienda-backend:eks-v1

        docker build -t $REAL_ECR_URL/tienda-frontend:eks-v1 ./frontend
        docker push $REAL_ECR_URL/tienda-frontend:eks-v1

    # ===================================================================
    # PASO 5: BÚSQUEDA AUTOMÁTICA Y DESPLIEGUE SEGURO (¡INCORRUPTIBLE!)
    # ===================================================================
    - name: Desplegar e inyectar imágenes en Kubernetes
      run: |
        echo "=== DETECTANDO ARCHIVOS EN EL REPOSITORIO ==="
        # Buscamos de forma inteligente dónde están los manifiestos de Kubernetes
        # para evitar el error de "path does not exist"
        PATH_NS=$(find . -name "namespace.yaml" -o -name "namespace.yml" | head -n 1)
        PATH_SEC=$(find . -name "mysql-secret.yaml" -o -name "mysql-secret.yml" | head -n 1)
        PATH_M_DEP=$(find . -name "mysql-deployment.yaml" -o -name "mysql-deployment.yml" | head -n 1)
        PATH_M_SVC=$(find . -name "mysql-service.yaml" -o -name "mysql-service.yml" | head -n 1)
        PATH_B_DEP=$(find . -name "backend-deployment.yaml" -o -name "backend-deployment.yml" | head -n 1)
        PATH_B_SVC=$(find . -name "backend-service.yaml" -o -name "backend-service.yml" | head -n 1)
        PATH_B_HPA=$(find . -name "*hpa-backend*" -o -name "*backend-hpa*" | head -n 1)
        PATH_F_DEP=$(find . -name "frontend-deployment.yaml" -o -name "frontend-deployment.yml" | head -n 1)
        PATH_F_SVC=$(find . -name "frontend-service.yaml" -o -name "frontend-service.yml" | head -n 1)

        echo "Manifiestos encontrados:"
        echo "Namespace -> $PATH_NS"
        echo "Backend HPA -> $PATH_B_HPA"

        # 1. Aplicamos los planos usando las rutas dinámicas encontradas
        kubectl apply -f $PATH_NS
        kubectl apply -f $PATH_SEC -n tienda
        kubectl apply -f $PATH_M_DEP -n tienda
        kubectl apply -f $PATH_M_SVC -n tienda
        kubectl apply -f $PATH_B_DEP -n tienda
        kubectl apply -f $PATH_B_SVC -n tienda
        kubectl apply -f $PATH_B_HPA -n tienda
        kubectl apply -f $PATH_F_DEP -n tienda
        kubectl apply -f $PATH_F_SVC -n tienda

        # 2. Obtenemos la URL dinámica de tu cuenta de AWS actual
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
        REAL_ECR_URL="${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"

        # 3. Forzamos la actualización de imágenes directo en el clúster
        echo "Actualizando los contenedores con las rutas reales de ECR..."
        kubectl set image deployment/tienda-db mysql=$REAL_ECR_URL/tienda-db:eks-v1 -n tienda
        kubectl set image deployment/tienda-backend backend=$REAL_ECR_URL/tienda-backend:eks-v1 -n tienda
        kubectl set image deployment/tienda-frontend frontend=$REAL_ECR_URL/tienda-frontend:eks-v1 -n tienda

    # ===================================================================
    # PASO 6: REVISIÓN DE ESTADO
    # ===================================================================
    - name: Verificar Estado de Salud de los Pods
      run: |
        echo "Esperando 40 segundos a que el clúster descargue e inicie los contenedores..."
        sleep 40
        echo "=========================================================="
        echo "ESTADO ACTUAL DE TUS PODS EN GIT:"
        kubectl get pods -n tienda
        echo "=========================================================="

    # ===================================================================
    # PASO 7: OBTENER URL DE LA WEB
    # ===================================================================
    - name: Obtener URL de la Tienda de Perritos
      run: |
        echo "=========================================================="
        kubectl get svc -n tienda
        echo "=========================================================="
